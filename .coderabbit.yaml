# CodeRabbit configuration — https://docs.coderabbit.ai/guides/configure-coderabbit
language: en-US
reviews:
  profile: chill
  request_changes_workflow: false
  high_level_summary: true
  poem: false
  review_status: true
  auto_review:
    enabled: true
    drafts: false
  # The committed Action/CLI bundle is generated by ncc; reviewing it is noise.
  path_filters:
    - "!dist/**"
    - "!package-lock.json"
  path_instructions:
    - path: "src/**/*.ts"
      instructions: >
        This is a design-system drift detector shipped as a GitHub Action, an Azure
        DevOps step, and a CLI over one pure engine (src/parser.ts). Favour explicit
        over clever, avoid adding runtime dependencies, and keep platform-specific code
        confined to src/platforms/* (the comment core in src/comment/* must stay
        platform-agnostic).
    - path: "tests/**/*.ts"
      instructions: >
        Vitest. Prefer behaviour + edge cases over smoke tests. Engine logic should be
        unit-tested without network or git where possible.
chat:
  auto_reply: true
