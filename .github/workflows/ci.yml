name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm run typecheck
      - run: npm test
      - run: npm run build:all
      # The Action runs from the committed bundle (dist/). Fail if the build
      # produced changes that weren't committed, so dist/ never drifts from src/.
      - name: Verify dist/ is up to date
        run: |
          if [ -n "$(git status --porcelain dist)" ]; then
            echo "::error::dist/ is out of date. Run 'npm run build:all' and commit dist/."
            git --no-pager diff --stat dist
            exit 1
          fi
